        .btn-hint { background: #edf2f7; border: 1px solid #cbd5e0; padding: 8px; width: 100%; cursor: pointer; border-radius: 5px; margin-bottom: 10px; font-weight: 600; color: #4a5568; }

        #submitBtn { background: #48bb78; color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #submitBtn:disabled { background: #cbd5e0; cursor: not-allowed; }
        .set-select { padding: 12px; margin: 20px 0; width: 100%; border-radius: 8px; border: 1px solid #cbd5e0; font-size: 1rem; }
        #gameOverScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 32, 44, 0.98); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; text-align: center; padding: 20px; }
        .history-box { margin-top: 20px; width: 100%; max-width: 450px; background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; }
        .history-list { text-align: left; font-size: 0.9rem; max-height: 150px; overflow-y: auto; padding-left: 20px; }
        #feedback { margin-top: 15px; font-weight: bold; font-size: 1.1rem; min-height: 1.5rem; }
    </style>
</head>
<body>

<div id="app">
    <h2 style="margin-top: 0; color: #2d3748;">🐝 CEFR Spelling Bee</h2>
    
    <div id="setupScreen">
        <p style="color: #718096;">Practice A2 & B1 Words in Sets of 60.</p>
        <select id="setSelector" class="set-select"></select>
        <button onclick="startSet()" class="btn-primary">Start Practice</button>
    </div>

    <div id="gameScreen" class="hidden">
        <div id="timer">60s</div>
        <button onclick="speakWord()" class="btn-primary">🔊 Listen to Word</button>
        
        <div id="hintContent" class="hidden" style="background:#fffaf0; padding:15px; border:1px dashed #ed8936; margin-bottom:10px; border-radius: 8px; text-align: left;">
            <p><strong>Definition:</strong> <span id="hintText"></span></p>
        </div>
        <button onclick="toggleHint()" class="btn-hint">Show Meaning</button>

        <div class="input-container">
            <input type="text" id="wordInput" placeholder="Type here..." autocomplete="off">
            <button onclick="checkAnswer()" id="submitBtn">Submit</button>
        </div>
        
        <div id="feedback">Attempts: 0/2</div>
        <div style="margin-top:10px; font-size: 0.85rem; color: #a0aec0;">
            Word <span id="progress">0</span> of 60 | Score: <span id="score">0</span>
        </div>
    </div>
</div>

<div id="gameOverScreen" class="hidden">
    <h1 style="font-size: 3rem; color: #feb2b2;">GAME OVER</h1>
    <p id="finalMsg" style="font-size: 1.2rem; margin-bottom: 25px;"></p>
    <button onclick="resetToMenu()" class="btn-primary" style="width: 220px; background: #48bb78;">Return to Menu</button>
</div>

<div class="history-box">
    <strong>📝 Words Tested:</strong>
    <ul id="testedList" class="history-list"></ul>
</div>

        "worth": "Having a particular value.",
        "wound": "An injury to your body.",
        "wow": "Used to show surprise or admiration.",
        "wrap": "To cover something by putting paper around it.",
        "wrist": "The joint between the hand and the arm.",
        "write": "To make words on paper using a pen or pencil.",
        "writer": "A person who writes books or stories.",
        "wrong": "Not correct.",
        "yellow": "The color of a lemon or the sun.",
        "yoga": "A set of exercises for the mind and body.",
        "yogurt": "A slightly sour food made from milk.",
        "you": "The person being spoken to.",
        "young": "In an early stage of life; not old.",
        "your": "Belonging to the person being spoken to.",
        "yours": "Used to refer to something belonging to you.",
        "youth": "The period of your life when you are young.",
        "zebra": "An African animal with black and white stripes.",
        "zero": "The number 0.",
        "zone": "An area where a particular thing happens."
    };

    const wordsArray = Object.keys(dictionary);
    const sets = [];
    for (let i = 0; i < wordsArray.length; i += 60) {
        sets.push(wordsArray.slice(i, Math.min(i + 60, wordsArray.length)));
    }

    let currentSet = [];
    let currentWord = "";
    let score = 0;
    let wordIndex = 0;
    let attempts = 0;
    let timer;
    let timeLeft = 60;
    let isSubmitted = false;

    // Build Selector
    const selector = document.getElementById('setSelector');
    sets.forEach((set, i) => {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerHTML = `Set ${i + 1}: ${set[0].toUpperCase()} ... ${set[set.length-1].toUpperCase()}`;
        selector.appendChild(opt);
    });

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'correct') {
            osc.frequency.setValueAtTime(523, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
        } else {
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.2);
        }
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    function startSet() {
        currentSet = sets[selector.value];
        document.getElementById('setupScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.remove('hidden');
        wordIndex = 0; score = 0;
        document.getElementById('score').innerText = "0";
        document.getElementById('testedList').innerHTML = ""; 
        nextWord();
    }

    function resetToMenu() {
        clearInterval(timer); window.speechSynthesis.cancel();
        document.getElementById('gameOverScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.add('hidden');
        document.getElementById('setupScreen').classList.remove('hidden');
        currentWord = ""; isSubmitted = false;
    }

    function nextWord() {
        if (wordIndex >= currentSet.length) {
            endGame(`CONGRATULATIONS! Set Finished. Score: ${score}/${currentSet.length * 10}`);
            return;
        }
        currentWord = currentSet[wordIndex];
        attempts = 0; isSubmitted = false;
        document.getElementById('wordInput').value = "";
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('feedback').innerText = "Attempts: 0/2";
        document.getElementById('feedback').style.color = "#4a5568";
        document.getElementById('progress').innerText = wordIndex + 1;
        document.getElementById('hintContent').classList.add('hidden');
        document.getElementById('hintText').innerText = dictionary[currentWord];
        
        startTimer(); speakWord();
    }

    function speakWord() {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(currentWord);
        utter.rate = 0.8; utter.lang = 'en-US';
        window.speechSynthesis.speak(utter);
    }

    function checkAnswer() {
        if (isSubmitted || currentWord === "") return;
        const guess = document.getElementById('wordInput').value.toLowerCase().trim();
        if (!guess) return;

        if (guess === currentWord.toLowerCase()) {
            playSound('correct'); score += 10;
            document.getElementById('score').innerText = score;
            logHistory(currentWord, true);
            isSubmitted = true; document.getElementById('submitBtn').disabled = true;
            wordIndex++; clearInterval(timer);
            setTimeout(nextWord, 1200);
        } else {
            attempts++; playSound('incorrect');
            if (attempts >= 2) {
                isSubmitted = true; document.getElementById('submitBtn').disabled = true;
                logHistory(currentWord, false);
                endGame(`GAME OVER! Incorrect twice on "${currentWord.toUpperCase()}". Score: ${score}`);
            } else {
                document.getElementById('feedback').innerText = "Wrong! Attempt 1 of 2 used.";
                document.getElementById('feedback').style.color = "#ed8936";
            }
        }
    }

    function startTimer() {
        clearInterval(timer); timeLeft = 60;
        document.getElementById('timer').innerText = timeLeft + "s";
        timer = setInterval(() => {
            timeLeft--; document.getElementById('timer').innerText = timeLeft + "s";
            if (timeLeft <= 0) {
                clearInterval(timer); logHistory(currentWord, false);
                endGame(`GAME OVER! Time ran out. Word was "${currentWord.toUpperCase()}". Score: ${score}`);
            }
        }, 1000);
    }

    function logHistory(word, correct) {
        const list = document.getElementById('testedList');
        const li = document.createElement('li');
        li.innerHTML = `<strong>${word.toUpperCase()}</strong> — ${correct ? '<span style="color:#48bb78;">✔ Correct</span>' : '<span style="color:#f56565;">✘ Failed</span>'}`;
        list.prepend(li);
    }

    function endGame(msg) {
        clearInterval(timer); window.speechSynthesis.cancel();
        document.getElementById('gameOverScreen').classList.remove('hidden');
        document.getElementById('finalMsg').innerText = msg;
    }

    function toggleHint() {
        document.getElementById('hintContent').classList.toggle('hidden');
    }

    document.getElementById('wordInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkAnswer();
    });
</script>
</body>
</html>
